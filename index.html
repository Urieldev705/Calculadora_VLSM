<!DOCTYPE html>
<html lang="es-Mx">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="static/css/index.css">
    <title>Subneteo | UWU</title>
</head>
<body>
    <main>
        <section>
            <form id="form-subneteo">
                <fieldset>
                    <legend>Subneteo VLSM</legend>
                    <label>Ingresa el numero de redes</label>
                    <input type="number" id="numero-de-redes" name="numero-de-redes" placeholder="Numero de redes" min="1" required>
                    <label>IP Inicial personalizada</label>
                    <input type="radio" name="ip-inicial" id="ip-inicial-personalizada" value="ip-inicial-personalizada" title="IP Inicial personalizada">
                    <label>IP Inicial</label>
                    <div>
                        <input type="number" name="octeto1" id="octeto1" placeholder="." min="0" max="255" >
                        <input type="number" name="octeto2" id="octeto2" placeholder="." min="0" max="255" >
                        <input type="number" name="octeto3" id="octeto3" placeholder="." min="0" max="255" >
                        <input type="number" name="octeto4" id="octeto4" placeholder="." min="0" max="255" >
                    </div>
                </fieldset>
                <fieldset>
                    <Legend>Cantidad de hosts en las redes</Legend>
                    <div id="cont-inputs-redes"></div>
                    <button type="submit" id="btn-calcular">
                        Calcular
                    </button>
                </fieldset>
            </form>
        </section>
        <section>
            <table>
                <colgroup>
                    <col class="col-tabla">
                    <col class="col-tabla">
                    <col class="col-tabla">
                    <col class="col-tabla">
                    <col class="col-tabla">
                </colgroup>
                <thead>
                    <tr>
                        <th>Red</th>
                        <th>broadcast</th>
                        <th>Mascara</th>
                        <th>Mascara bits</th>
                        <th>Hosts totales</th>
                        <th>Hosts disponibles</th>
                    </tr>
                </thead>
                <tbody id="tabla-subneteo">

                </tbody>
            </table>
        </section>
    </main>
    <script type="module" src="static/js/index.js"></script>
</body>
</html>
